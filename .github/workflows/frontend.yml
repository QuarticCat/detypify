name: Frontend code quality check

on:
  push:
    branches: [main, "*dev"]
  pull_request:
    branches: [main, "*dev"]
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: pnpm

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Cache postinstall artifacts
        uses: actions/cache@v5
        with:
          path: frontend/ui/.cache
          key: ${{ runner.os }}-frontend-postinstall-cache

      - name: Prepare generated metadata and model placeholders
        run: |
          mkdir -p build/generated frontend/service/train
          echo '[]' > build/generated/infer.json
          echo '{}' > build/generated/contrib.json
          echo '??' > frontend/service/train/model.onnx

      - name: Install dependencies
        run: pnpm install

      - name: Prettier check
        run: pnpm exec prettier --check .

      - name: Type check
        run: pnpm run check
        working-directory: frontend/ui
