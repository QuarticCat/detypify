name: Weekly Typst symbol metadata

on:
  workflow_dispatch:
    inputs:
      force_metadata:
        description: "Regenerate metadata even if no symbol change is detected"
        required: false
        type: boolean
        default: false
      train:
        description: "Run Kaggle training after metadata checks"
        required: false
        type: boolean
        default: false
  schedule:
    # weekly, Monday
    - cron: "0 0 * * 1"
  push:
    paths:
      - ".github/workflows/py-weekly-update.yml"
      - "python/proc_data.py"
      - "python/detypify/data/datasets.py"
      - "python/detypify/data/symbols.py"
      - "python/detypify/assets/tex_to_typ_sup.yaml"

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    outputs:
      should_generate: ${{ steps.detect.outputs.should_generate }}
      current_etag: ${{ steps.detect.outputs.current_etag }}
      current_digest: ${{ steps.detect.outputs.current_digest }}
    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
      GH_REPO: ${{ github.repository }}
      TARGET_URL: "https://typst.app/docs/reference/symbols/sym/"
      ETAG_VAR_NAME: "TYPST_SYMBOLS_ETAG"
      DIGEST_VAR_NAME: "TYPST_SYMBOLS_DIGEST"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch Typst symbols ETag
        id: etag
        shell: bash
        run: |
          current_etag=$(curl -fsSI "$TARGET_URL" | awk 'tolower($1) == "etag:" { sub(/\r$/, "", $2); print $2; exit }')
          if [ -z "$current_etag" ]; then
            echo "::error::Could not fetch Typst symbol page ETag."
            exit 1
          fi

          stored_etag=$(gh variable get "$ETAG_VAR_NAME" --json value -q .value 2>/dev/null || true)
          echo "current=$current_etag" >> "$GITHUB_OUTPUT"
          echo "stored=$stored_etag" >> "$GITHUB_OUTPUT"
          echo "Stored ETag:  $stored_etag"
          echo "Current ETag: $current_etag"

      - name: Setup uv
        if: ${{ github.event_name == 'push' || inputs.force_metadata || steps.etag.outputs.current != steps.etag.outputs.stored }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Detect metadata changes
        id: detect
        shell: bash
        env:
          CURRENT_ETAG: ${{ steps.etag.outputs.current }}
          STORED_ETAG: ${{ steps.etag.outputs.stored }}
          FORCE_METADATA: ${{ inputs.force_metadata || 'false' }}
        run: |
          should_compute_digest=false
          should_generate=false
          current_digest=""

          if [ "${{ github.event_name }}" = "push" ]; then
            should_compute_digest=true
            should_generate=true
            echo "Push touched watched symbol metadata inputs; metadata will be regenerated."
          elif [ "$FORCE_METADATA" = "true" ]; then
            should_compute_digest=true
            should_generate=true
            echo "Manual force requested; metadata will be regenerated."
          elif [ "$CURRENT_ETAG" != "$STORED_ETAG" ]; then
            should_compute_digest=true
            echo "ETag changed; computing effective mapping digest."
          else
            echo "ETag unchanged; skipping digest calculation."
          fi

          if [ "$should_compute_digest" = "true" ]; then
            digest_json=$(uv run --extra=data python/proc_data.py --print-tex-typ-map-digest)
            current_digest=$(jq -r '.tex_typ_map_digest' <<< "$digest_json")
            stored_digest=$(gh variable get "$DIGEST_VAR_NAME" --json value -q .value 2>/dev/null || true)

            echo "Stored digest:  $stored_digest"
            echo "Current digest: $current_digest"

            if [ "$CURRENT_ETAG" != "$STORED_ETAG" ] && [ "$current_digest" != "$stored_digest" ]; then
              should_generate=true
              echo "Effective mapping digest changed; metadata will be regenerated."
            elif [ "$CURRENT_ETAG" != "$STORED_ETAG" ]; then
              echo "ETag changed, but effective mapping digest is unchanged. Updating stored ETag."
              gh variable set "$ETAG_VAR_NAME" --body "$CURRENT_ETAG"
            fi
          fi

          echo "should_generate=$should_generate" >> "$GITHUB_OUTPUT"
          echo "current_etag=$CURRENT_ETAG" >> "$GITHUB_OUTPUT"
          echo "current_digest=$current_digest" >> "$GITHUB_OUTPUT"

  generate-metadata:
    needs: detect
    if: ${{ needs.detect.outputs.should_generate == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
      GH_REPO: ${{ github.repository }}
      ETAG_VAR_NAME: "TYPST_SYMBOLS_ETAG"
      DIGEST_VAR_NAME: "TYPST_SYMBOLS_DIGEST"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Cache Hugging Face datasets
        uses: actions/cache@v4
        with:
          path: build/datasets/cache
          key: huggingface-datasets-${{ runner.os }}-${{ needs.detect.outputs.current_digest }}
          restore-keys: |
            huggingface-datasets-${{ runner.os }}-

      - name: Generate metadata
        run: uv run --extra=data python/proc_data.py --gen-metadata

      - name: Upload metadata artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-metadata
          path: |
            build/generated/infer.json
            build/generated/contrib.json
            build/generated/unmapped_latex_symbols.json

      - name: Update stored symbol state
        shell: bash
        env:
          CURRENT_ETAG: ${{ needs.detect.outputs.current_etag }}
          CURRENT_DIGEST: ${{ needs.detect.outputs.current_digest }}
        run: |
          if [ -z "$CURRENT_DIGEST" ]; then
            digest_json=$(uv run --extra=data python/proc_data.py --print-tex-typ-map-digest)
            CURRENT_DIGEST=$(jq -r '.tex_typ_map_digest' <<< "$digest_json")
          fi

          gh variable set "$ETAG_VAR_NAME" --body "$CURRENT_ETAG"
          gh variable set "$DIGEST_VAR_NAME" --body "$CURRENT_DIGEST"

  train-on-kaggle:
    needs:
      - detect
      - generate-metadata
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.train && needs.detect.result == 'success' && (needs.generate-metadata.result == 'success' || needs.generate-metadata.result == 'skipped') }}
    runs-on: ubuntu-latest
    env:
      TITLE: "Detypify Auto Training"
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up notebook kernel
        shell: bash
        env:
          REPO_URL: "https://github.com/${{ github.repository }}"
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          python -m pip install --upgrade kaggle --user
          output_notebook="script.ipynb"

          cat > "$output_notebook" <<EOM
          {
            "cells": [
              {
                "cell_type": "code",
                "execution_count": null,
                "metadata": {},
                "outputs": [],
                "source": [
                  "!git clone --branch $BRANCH_NAME $REPO_URL.git detypify"
                ]
              },
              {
                "cell_type": "code",
                "execution_count": null,
                "metadata": {},
                "outputs": [],
                "source": [
                  "!cd detypify && pip install uv && uv --quiet sync && uv run python/train.py"
                ]
              },
              {
                "cell_type": "code",
                "execution_count": null,
                "metadata": {},
                "outputs": [],
                "source": [
                  "!for f in detypify/build/train/*/version_*/ckpts/*.onnx; do model=\\$(echo \\$f | cut -d/ -f4); cp \\$f /kaggle/working/\\$model.onnx && echo \"Copied \\$f -> /kaggle/working/\\$model.onnx\"; done"
                ]
              }
            ],
            "metadata": {
              "kernelspec": {
                "display_name": "Python 3",
                "language": "python",
                "name": "python3"
              },
              "language_info": {
                "name": "python",
                "version": "3.13"
              }
            },
            "nbformat": 4,
            "nbformat_minor": 2
          }
          EOM

      - name: Push kernel
        shell: bash
        run: |
          kaggle kernels init -p .

          kaggle_username=$(jq -r '.id' kernel-metadata.json | cut -d'/' -f1)
          kernel_slug=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g')
          kernel_id="$kaggle_username/$kernel_slug"
          echo "KERNEL_ID=$kernel_id" >> "$GITHUB_ENV"

          jq --arg id "$kernel_id" \
             --arg title "$TITLE" \
             --arg code_file "script.ipynb" \
             '.id = $id | .title = $title | .code_file = $code_file | .language = "python" | .kernel_type = "notebook" | .enable_gpu = true | .enable_internet = true' \
             kernel-metadata.json > kernel-metadata.json.tmp
          mv kernel-metadata.json.tmp kernel-metadata.json

          kaggle kernels push -p . --accelerator 'NvidiaTeslaT4'

      - name: Check status
        shell: bash
        run: |
          echo "Checking status for $KERNEL_ID..."
          max_retries=240
          count=0

          while [ "$count" -lt "$max_retries" ]; do
            status=$(kaggle kernels status "$KERNEL_ID" 2>&1)
            echo "Status: $status"

            if [[ "$status" == *"ERROR"* || "$status" == *"CANCEL"* ]]; then
              echo "::error::Kernel execution failed."
              exit 1
            elif [[ "$status" == *"COMPLETE"* ]]; then
              echo "Kernel execution completed successfully!"
              exit 0
            fi

            sleep 60
            count=$((count+1))
          done

          echo "::error::Kernel execution timed out after 4 hours."
          exit 1

      - name: Download artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          kaggle kernels output "$KERNEL_ID" -p artifacts

      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-onnx-models
          path: artifacts
